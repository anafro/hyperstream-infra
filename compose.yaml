services:
    # Networking
    # --------------------------
    nginx:
        container_name: nginx
        image: nginx:1.29.4-alpine3.23
        restart: unless-stopped
        depends_on:
            website:
                condition: service_started
            leonardo:
                condition: service_healthy
        ports:
            - 80:80
            - 443:443
        healthcheck:
            test: ["CMD-SHELL", "nginx -t || exit 1"]
            interval: 30s
            timeout: 3s
            start_period: 15s
            start_interval: 1s
            retries: 3
        volumes:
            - ./secrets/nginx.conf:/etc/nginx/nginx.conf:ro
        networks:
            - internal
    # --------------------------
    #
    # Storages
    # --------------------------
    postgresql:
        container_name: postgresql
        image: postgres:18.1-alpine3.23
        restart: unless-stopped
        volumes:
            - "postgresql:/var/lib/postgresql"
        secrets:
            - postgresql-username
            - postgresql-password
            - postgresql-database
        environment:
            - PSUSER_FILE=/run/secrets/postgresql-username
            - POSTGRES_USER_FILE=/run/secrets/postgresql-username
            - POSTGRES_PASSWORD_FILE=/run/secrets/postgresql-password
            - POSTGRES_DB_FILE=/run/secrets/postgresql-database
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -d ${POSTGRESQL_DATABASE} -U ${POSTGRESQL_USERNAME} || exit 1",
                ]
            interval: 5s
            timeout: 3s
            start_period: 30s
            start_interval: 2s
            retries: 5
        networks:
            - internal
    localstack:
        container_name: localstack
        image: gresau/localstack-persist:4
        restart: unless-stopped
        volumes:
            - "localstack:/persisted-data"
        environment:
            - SERVICES=s3
            - DEFAULT_REGION=eu-central-1
            - PERSIST_BASE_DIR=/persisted-data
            - PERSIST_DEFAULT=0
            - PERSIST_S3=1
            - AWS_ACCESS_KEY_ID_FILE=/run/secrets/aws-access-key
            - AWS_SECRET_ACCESS_KEY_FILE=/run/secrets/aws-secret-key
        secrets:
            - aws-access-key
            - aws-secret-key
        healthcheck:
            test: ["CMD", "bash", "-c", "awslocal s3 ls"]
            interval: 10s
            timeout: 3s
            start_period: 30s
            start_interval: 2s
            retries: 5
        networks:
            - internal
    # --------------------------
    #
    # Messaging
    # --------------------------
    rabbitmq:
        container_name: rabbitmq
        image: rabbitmq:4.2-alpine
        restart: unless-stopped
        volumes:
            - "rabbitmq:/var/lib/rabbitmq"
        environment:
            - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER}
            - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS}
        healthcheck:
            test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
            interval: 60s
            timeout: 3s
            start_period: 30s
            start_interval: 3s
            retries: 3
        networks:
            - internal
    # --------------------------
    #
    # Observability
    # --------------------------
    otelcol:
        container_name: otelcol
        image: otel/opentelemetry-collector-contrib:0.145.0
        volumes:
            - ./configs/otel-collector-config.yml:/etc/otelcol-contrib/config.yaml
        ports:
            - 4317:4317
            - 4318:4318
            - 55679:55679
        restart: unless-stopped
        networks:
            - internal
    loki:
        container_name: loki
        image: grafana/loki:3.6.4
        volumes:
            - ./configs/loki-config.yml:/mnt/config/loki-config.yaml
            - "loki:/loki"
        command: ["-config.file=/mnt/config/loki-config.yaml"]
        networks:
            - internal
    #    tempo:
    #        container_name: tempo
    #        image: grafana/tempo:2.10.0
    #        volumes:
    #            - "tempo:/var/tempo"
    #            - ./configs/tempo-config.yml:/etc/tempo/tempo.yaml
    #        command: ["-config.file=/etc/tempo/tempo.yaml"]
    #        networks:
    #            - internal
    prometheus:
        container_name: prometheus
        image: prom/prometheus:v3.9.1
        volumes:
            - "prometheus:/prometheus"
        networks:
            - internal
    grafana:
        container_name: grafana
        image: grafana/grafana:12.4.0-21693836646-ubuntu
        volumes:
            - ./configs/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yaml
            - "grafana:/var/lib/grafana"
        ports:
            - 3000:3000
        networks:
            - internal
    # --------------------------
    #
    # Services
    # --------------------------
    leonardo:
        container_name: leonardo
        image: anafro/hyperstream-leonardo:v0.0.0-beta.5
        restart: unless-stopped
        volumes:
            - "./bin/opentelemetry-javaagent.jar:/app/opentelemetry-agent.jar"
        depends_on:
            localstack:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "nc -z localhost 5001"]
            interval: 30s
            timeout: 3s
            start_period: 8s
            start_interval: 1s
            retries: 3
        entrypoint:
            [
                "java",
                "-javaagent:/app/opentelemetry-agent.jar",
                "-Dotel.service.name=leonardo",
                "-Dotel.exporter.otlp.endpoint=http://otelcol:4317",
                "-Dotel.exporter.otlp.protocol=grpc",
                "-Dotel.logs.exporter=otlp",
                "-jar",
                "/app/Hyperstream-Leonardo.jar",
            ]
        command:
            [
                "--width",
                "1024",
                "--height",
                "1024",
                "--generator",
                "lmc",
                "--host",
                "0.0.0.0",
                "--port",
                "5001",
                "nocache",
            ]
        environment:
            - S3_HOST=http://localstack:4566
            - S3_ACCESS_KEY_FILE=/run/secrets/aws-access-key
            - S3_SECRET_KEY_FILE=/run/secrets/aws-secret-key
            - S3_REGION_FILE=/run/secrets/aws-region
            - S3_BUCKET_FILE=/run/secrets/aws-leonardo-s3-bucket
            - RABBITMQ_HOST=rabbitmq
            - RABBITMQ_USER_FILE=/run/secrets/rabbitmq-username
            - RABBITMQ_PASS_FILE=/run/secrets/rabbitmq-password
            - RABBITMQ_EXCHANGE_FILE=/run/secrets/rabbitmq-exchange
        secrets:
            - aws-access-key
            - aws-secret-key
            - aws-region
            - aws-leonardo-s3-bucket
            - rabbitmq-username
            - rabbitmq-password
            - rabbitmq-exchange
        networks:
            - internal
    kraken:
        container_name: kraken
        image: anafro/hyperstream-kraken:v0.0.0-alpha.3
        restart: unless-stopped
        environment:
            - RABBITMQ_HOST=rabbitmq
            - RABBITMQ_USER_FILE=/run/secrets/rabbitmq-username
            - RABBITMQ_PASS_FILE=/run/secrets/rabbitmq-password
            - RABBITMQ_EXCHANGE_FILE=/run/secrets/rabbitmq-exchange
            - S3_HOST=http://localstack:4566
            - S3_ACCESS_KEY_FILE=/run/secrets/aws-access-key
            - S3_SECRET_KEY_FILE=/run/secrets/aws-secret-key
            - S3_REGION_FILE=/run/secrets/aws-region
            - S3_BUCKET_FILE=/run/secrets/aws-kraken-s3-bucket
            - PGSQL_HOST=postgresql
            - PGSQL_USERNAME_FILE=/run/secrets/postgresql-username
            - PGSQL_PASSWORD_FILE=/run/secrets/postgresql-password
            - PGSQL_DATABASE_FILE=/run/secrets/postgresql-kraken-database
        secrets:
            - rabbitmq-username
            - rabbitmq-password
            - rabbitmq-exchange
            - aws-access-key
            - aws-secret-key
            - aws-region
            - aws-kraken-s3-bucket
            - postgresql-username
            - postgresql-password
            - postgresql-kraken-database
        depends_on:
            rabbitmq:
                condition: service_healthy
            postgresql:
                condition: service_healthy
            localstack:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "curl -f http://localhost:44099/up || exit 1"]
            start_period: 8s
            interval: 30s
            timeout: 10s
            retries: 5
        networks:
            - internal
    website:
        container_name: website
        image: anafro/hyperstream-website:v0.0.0-dev.10
        restart: unless-stopped
        volumes:
            - website-storage:/app/storage
            - ./secrets/laravel.env:/app/.env:ro
        environment:
            - MIGRATE=${HYPERSTREAM_WEBSITE_MIGRATE:-false}
            - OTEL_LOGS_EXPORTER=otlp
            - OTEL_EXPORTER_OTLP_ENDPOINT=http://otelcol:4318
            - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
            - OTEL_WORKER_MODE_FLUSH_AFTER_EACH_ITERATION=true
        depends_on:
            rabbitmq:
                condition: service_healthy
            leonardo:
                condition: service_healthy
            kraken:
                condition: service_healthy
            postgresql:
                condition: service_healthy
        networks:
            - internal
    # --------------------------

volumes:
    postgresql:
    localstack:
    rabbitmq:
    grafana:
    loki:
    prometheus:
    tempo:
    website-storage:

secrets:
    postgresql-username:
        file: ./secrets/postgresql-username.txt
    postgresql-password:
        file: ./secrets/postgresql-password.txt
    postgresql-database:
        file: ./secrets/postgresql-database.txt
    postgresql-kraken-database:
        file: ./secrets/postgresql-kraken-database.txt
    aws-access-key:
        file: ./secrets/aws-access-key.txt
    aws-secret-key:
        file: ./secrets/aws-secret-key.txt
    aws-region:
        file: ./secrets/aws-region.txt
    rabbitmq-username:
        file: ./secrets/rabbitmq-username.txt
    rabbitmq-password:
        file: ./secrets/rabbitmq-password.txt
    rabbitmq-exchange:
        file: ./secrets/rabbitmq-exchange.txt
    aws-kraken-s3-bucket:
        file: ./secrets/aws-kraken-s3-bucket.txt
    aws-leonardo-s3-bucket:
        file: ./secrets/aws-leonardo-s3-bucket.txt

networks:
    internal:
        driver: bridge
