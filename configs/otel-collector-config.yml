receivers:
    otlp:
        protocols:
            grpc:
                endpoint: 0.0.0.0:4317
            http:
                endpoint: 0.0.0.0:4318

processors:
    batch:
        send_batch_size: 512
        timeout: 5s

exporters:
    debug:
        verbosity: detailed
    otlphttp/loki:
        endpoint: http://loki:3100/otlp
    prometheusremotewrite/prometheus:
        endpoint: http://prometheus:9090/api/v1/push

service:
    pipelines:
        logs:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug, otlphttp/loki]
        metrics:
            receivers: [otlp]
            processors: [batch]
            exporters: [debug, prometheusremotewrite/prometheus]
